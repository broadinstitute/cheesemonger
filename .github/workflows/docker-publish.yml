name: Build & push image

# Builds the server image and pushes it to the CDS Artifact Registry Docker repo.
# Runs only when server code or build inputs change (path filter below), on the
# default branch, plus manual dispatch.
#
# Required repository configuration (Settings -> Secrets and variables -> Actions):
#   vars.GCP_WORKLOAD_IDENTITY_PROVIDER  e.g. projects/123/locations/global/workloadIdentityPools/gh/providers/gh
#   vars.GCP_SERVICE_ACCOUNT             a service account with Artifact Registry Writer on cds-docker-containers
# (Alternatively, swap the auth step for a service-account JSON key in secrets.)

on:
  push:
    branches: [main]
    paths:
      - "cheesemonger/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # for Workload Identity Federation

# NOTE: temporarily publishing to GCR (us.gcr.io) instead of the Artifact
# Registry docker repo, because dev.cds.team's docker credential helper is wired
# for GCR but not yet for *.pkg.dev. Switch back to AR once that's fixed
# (see docs/planning.md).
env:
  IMAGE: us.gcr.io/cds-docker-containers/cheesemonger

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to the registry
        uses: docker/login-action@v3
        with:
          registry: us.gcr.io
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
